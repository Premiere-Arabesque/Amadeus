<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

<defs>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
<feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
</filter>
<linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0d1117"/>
<stop offset="100%" stop-color="#161b22"/>
</linearGradient>
<linearGradient id="personaGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#7c3aed"/>
<stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
<linearGradient id="runtimeGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#059669"/>
<stop offset="100%" stop-color="#34d399"/>
</linearGradient>
<linearGradient id="interactionGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#2563eb"/>
<stop offset="100%" stop-color="#60a5fa"/>
</linearGradient>
<linearGradient id="infraGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#d97706"/>
<stop offset="100%" stop-color="#fbbf24"/>
</linearGradient>
<linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#db2777"/>
<stop offset="100%" stop-color="#f472b6"/>
</linearGradient>
<linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#6b7280"/>
<stop offset="100%" stop-color="#9ca3af"/>
</linearGradient>
<marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6" fill="#9ca3af" stroke="none"/>
</marker>
<marker id="arrowHeadPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6" fill="#f472b6" stroke="none"/>
</marker>
</defs>

<!-- Background -->
<rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

<!-- Title -->
<text x="450" y="42" text-anchor="middle" fill="#f0f6fc" font-size="22" font-weight="700" letter-spacing="1">Amadeus — System Architecture</text>
<text x="450" y="64" text-anchor="middle" fill="#8b949e" font-size="12" font-style="italic">Character-Driven Agent Runtime for Sustainable Virtual Personalities</text>

<!-- ===================== FOUR LAYERS (Left side) ===================== -->

<!-- Layer 1: Character Layer -->
<rect x="50" y="95" width="580" height="85" rx="10" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="50" y="95" width="6" height="85" rx="3" fill="url(#personaGrad)"/>
<text x="80" y="122" fill="#a78bfa" font-size="14" font-weight="700">Character Layer</text>
<text x="80" y="142" fill="#8b949e" font-size="11.5">Who is this person?</text>
<text x="80" y="165" fill="#c9d1d9" font-size="12">soul.md · Identity &amp; Traits · Relationships · Schedule · Activity Range</text>

<!-- Layer 2: Life Runtime Layer -->
<rect x="50" y="200" width="580" height="105" rx="10" fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="50" y="200" width="6" height="105" rx="3" fill="url(#runtimeGrad)"/>
<text x="80" y="227" fill="#34d399" font-size="14" font-weight="700">Life Runtime Layer</text>
<text x="80" y="247" fill="#8b949e" font-size="11.5">How does this person live today?</text>

<!-- Sub-boxes inside runtime -->
<rect x="80" y="260" width="105" height="32" rx="6" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-opacity="0.4" stroke-width="1"/>
<text x="132" y="281" text-anchor="middle" fill="#a7f3d0" font-size="11">Planning</text>

<rect x="205" y="260" width="105" height="32" rx="6" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-opacity="0.4" stroke-width="1"/>
<text x="257" y="281" text-anchor="middle" fill="#a7f3d0" font-size="11">Execution</text>

<rect x="330" y="260" width="105" height="32" rx="6" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-opacity="0.4" stroke-width="1"/>
<text x="382" y="281" text-anchor="middle" fill="#a7f3d0" font-size="11">Replan</text>

<!-- Arrows between sub-boxes -->
<line x1="185" y1="276" x2="200" y2="276" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowHead)"/>
<line x1="310" y1="276" x2="325" y2="276" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowHead)"/>
<!-- Replan back to Planning -->
<path d="M382,293 L382,300 L132,300 L132,293" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

<!-- Three zones label -->
<text x="480" y="275" fill="#6ee7b7" font-size="10" font-style="italic">Real · Weak Real · Ambiguity</text>
<text x="480" y="290" fill="#6ee7b7" font-size="10" font-style="italic">Roleplay ↔ Executor isolation</text>

<!-- Layer 3: Interaction Layer -->
<rect x="50" y="325" width="580" height="85" rx="10" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="50" y="325" width="6" height="85" rx="3" fill="url(#interactionGrad)"/>
<text x="80" y="352" fill="#60a5fa" font-size="14" font-weight="700">Interaction Layer</text>
<text x="80" y="372" fill="#8b949e" font-size="11.5">How does this person connect with the world?</text>
<text x="80" y="397" fill="#c9d1d9" font-size="12">Communication Hub · Channel Adapters · User ↔ Agent · Agent ↔ Agent</text>

<!-- Layer 4: Infrastructure Layer -->
<rect x="50" y="430" width="580" height="85" rx="10" fill="#d97706" fill-opacity="0.12" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="50" y="430" width="6" height="85" rx="3" fill="url(#infraGrad)"/>
<text x="80" y="457" fill="#fbbf24" font-size="14" font-weight="700">Infrastructure Layer</text>
<text x="80" y="477" fill="#8b949e" font-size="11.5">How does the system run?</text>
<text x="80" y="500" fill="#c9d1d9" font-size="12">Orchestrator · Tool Registry · MCP Compat · Model Router · Storage</text>

<!-- ===================== MEMORY (Right side, vertical) ===================== -->

<rect x="665" y="95" width="190" height="420" rx="10" fill="#db2777" fill-opacity="0.1" stroke="#db2777" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="665" y="95" width="190" height="6" rx="3" fill="url(#memoryGrad)"/>

<text x="760" y="126" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="700">Memory System</text>
<text x="760" y="145" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">Cross-cutting</text>

<!-- Memory sub-items -->
<rect x="685" y="165" width="150" height="55" rx="6" fill="#db2777" fill-opacity="0.12" stroke="#db2777" stroke-opacity="0.3" stroke-width="1"/>
<text x="760" y="186" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="600">Core Memory</text>
<text x="760" y="203" text-anchor="middle" fill="#8b949e" font-size="9.5">Always in prompt</text>

<rect x="685" y="235" width="150" height="55" rx="6" fill="#db2777" fill-opacity="0.12" stroke="#db2777" stroke-opacity="0.3" stroke-width="1"/>
<text x="760" y="256" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="600">Active Memory</text>
<text x="760" y="273" text-anchor="middle" fill="#8b949e" font-size="9.5">7-14 days · Searchable</text>

<rect x="685" y="305" width="150" height="55" rx="6" fill="#db2777" fill-opacity="0.12" stroke="#db2777" stroke-opacity="0.3" stroke-width="1"/>
<text x="760" y="326" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="600">Archive Memory</text>
<text x="760" y="343" text-anchor="middle" fill="#8b949e" font-size="9.5">Compressed long-term</text>

<rect x="685" y="375" width="150" height="55" rx="6" fill="#db2777" fill-opacity="0.12" stroke="#db2777" stroke-opacity="0.3" stroke-width="1"/>
<text x="760" y="396" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="600">Raw Log</text>
<text x="760" y="413" text-anchor="middle" fill="#8b949e" font-size="9.5">Append-only · Per-day</text>

<!-- Memory flow arrows (down) -->
<line x1="760" y1="220" x2="760" y2="230" stroke="#f472b6" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHeadPink)"/>
<line x1="760" y1="290" x2="760" y2="300" stroke="#f472b6" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHeadPink)"/>

<!-- Arrows from layers to memory -->
<line x1="630" y1="137" x2="680" y2="180" stroke="#f472b6" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="4,3" marker-end="url(#arrowHeadPink)"/>
<line x1="630" y1="252" x2="680" y2="252" stroke="#f472b6" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="4,3" marker-end="url(#arrowHeadPink)"/>
<line x1="630" y1="367" x2="680" y2="367" stroke="#f472b6" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="4,3" marker-end="url(#arrowHeadPink)"/>

<!-- ===================== DATA FLOW ARROWS (between layers) ===================== -->

<!-- Character → Runtime -->
<line x1="340" y1="180" x2="340" y2="195" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrowHead)"/>

<!-- Runtime → Interaction -->
<line x1="340" y1="305" x2="340" y2="320" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrowHead)"/>

<!-- Interaction → Runtime (user interrupts) -->
<line x1="370" y1="325" x2="370" y2="310" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

<!-- Runtime → Infra -->
<line x1="340" y1="410" x2="340" y2="425" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrowHead)"/>

<!-- Interaction → Infra -->
<line x1="370" y1="410" x2="370" y2="425" stroke="#9ca3af" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowHead)"/>

<!-- ===================== BOTTOM TAGLINE ===================== -->

<text x="450" y="555" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="500">Persona Description → Continuous Life Trajectory &amp; Interactions</text>

<text x="450" y="580" text-anchor="middle" fill="#6b7280" font-size="10.5">Event-driven · Layered planning · Three-zone execution · Persistent memory</text>
<text x="450" y="598" text-anchor="middle" fill="#6b7280" font-size="10.5">Python 3.12 · FastAPI · PydanticAI · SQLite · MCP Compatible</text>
</svg>
